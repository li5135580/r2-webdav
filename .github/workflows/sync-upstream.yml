name: Sync upstream

on:
  schedule:
    - cron: "0 3 * * *" # 北京时间 11:00 运行
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'Commit hash (留空则同步最新提交)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/abersheeran/r2-webdav.git || true
          git fetch upstream --tags

      - name: Resolve target commit
        id: resolve
        run: |
          TRIGGER="${{ github.event_name }}"
          MANUAL_INPUT="${{ github.event.inputs.target_commit }}"

          if [ "$TRIGGER" = "schedule" ]; then
            # 自动模式：尝试获取最新 Release
            LATEST_TAG=$(curl -s https://api.github.com/repos/abersheeran/r2-webdav/releases/latest | jq -r .tag_name)
            
            # 检查是否有有效 Release，从截图看右侧 Releases 为空，所以这里大概率会跳到 else
            if [ "$LATEST_TAG" = "null" ] || [ -z "$LATEST_TAG" ]; then
              echo "上游未发现 Release，直接同步 main 分支最新提交。"
              TARGET_SHA=$(git rev-parse upstream/main)
              echo "latest_tag=None" >> $GITHUB_OUTPUT
            else
              TARGET_SHA=$(git rev-list -n 1 "$LATEST_TAG" 2>/dev/null)
              echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
            fi
            echo "mode=auto" >> $GITHUB_OUTPUT
            echo "target_sha=$TARGET_SHA" >> $GITHUB_OUTPUT

          elif [ -n "$MANUAL_INPUT" ]; then
            TARGET_SHA=$(git rev-parse "$MANUAL_INPUT" 2>/dev/null)
            echo "mode=manual" >> $GITHUB_OUTPUT
            echo "target_sha=$TARGET_SHA" >> $GITHUB_OUTPUT
          else
            # 手动模式且输入为空：同步上游 main 分支
            TARGET_SHA=$(git rev-parse upstream/main)
            echo "mode=manual" >> $GITHUB_OUTPUT
            echo "target_sha=$TARGET_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Check if update is needed
        id: check
        run: |
          TARGET_SHA="${{ steps.resolve.outputs.target_sha }}"
          MODE="${{ steps.resolve.outputs.mode }}"
          if [ "$MODE" = "manual" ]; then
            CURRENT_SHA=$(git rev-parse HEAD)
            [ "$CURRENT_SHA" = "$TARGET_SHA" ] && echo "needs_update=false" >> $GITHUB_OUTPUT || echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            git merge-base --is-ancestor "$TARGET_SHA" HEAD 2>/dev/null && echo "needs_update=false" >> $GITHUB_OUTPUT || echo "needs_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Apply update
        if: steps.check.outputs.needs_update == 'true'
        run: |
          TARGET_SHA="${{ steps.resolve.outputs.target_sha }}"
          MODE="${{ steps.resolve.outputs.mode }}"
          # 明确检出你本地的 main 分支
          git checkout main
          if [ "$MODE" = "manual" ]; then
            git reset --hard "$TARGET_SHA"
          else
            git merge "$TARGET_SHA" --no-edit
          fi

      - name: Restore workflow file
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git checkout HEAD@{1} -- .github/workflows/sync-upstream.yml 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: restore sync-upstream workflow after sync"
          fi

      - name: Push
        if: steps.check.outputs.needs_update == 'true'
        run: |
          if [ "${{ steps.resolve.outputs.mode }}" = "manual" ]; then
            git push origin main --force
          else
            git push origin main
          fi
